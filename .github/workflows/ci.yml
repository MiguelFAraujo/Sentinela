name: CI

on:
  push:
    branches: ["main", "feature/*"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Lint (compile check)
        run: |
          uv run python -m py_compile app/config.py
          uv run python -m py_compile app/scanner.py
          uv run python -m py_compile app/llm.py
          uv run python -m py_compile app/agente.py

      - name: Tests
        run: uv run python -m pytest tests/ -v
