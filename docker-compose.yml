services:
  ollama:
    image: ollama/ollama
    container_name: sentinela_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:11434/api/tags" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "sleep 3 && ollama pull llama3 && echo '✅ Modelo baixado!'"
    environment:
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ollama_data:/root/.ollama

  sentinela:
    build: .
    container_name: sentinela_app
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - TARGET_IP=host.docker.internal
    ports:
      - "3333:3333"
    restart: unless-stopped

volumes:
  ollama_data:
